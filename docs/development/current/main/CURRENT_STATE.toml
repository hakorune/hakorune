active_lane = "phase-294x usize semantic foundation"
active_lane_status = "Phase 294x cuts exact usize semantics as a Hakorune completeness lane before the mimalloc .hako port migrates live hako_alloc state to usize. NumericTarget and NumericKind own target pointer-width resolution and target-resolved numeric kind metadata in src/mir/numeric_substrate.rs. Parser/AST preserves declared parameter metadata and accepted return type annotations while keeping params as the names-only compatibility surface. AST JSON and Stage1 Program(JSON) transport that metadata without changing runtime behavior. MIR owns side-car exact numeric type metadata distinct from MirType::Integer, plus range-checked exact numeric constant/dynamic Integer(i64) conversion metadata. The MIR numeric substrate now owns checked exact numeric add/sub/mul policy plus exact numeric compare and unsigned logical right-shift policy. src/mir/exact_numeric_unification.rs owns conservative PHI/Select exact numeric merge policy. src/mir/exact_numeric_value_facts.rs now publishes per-value exact numeric facts for exact numeric declared params, typed integer literal consts, field reads, Copy, conservative PHI/Select merges, exact BinOp::Add/Sub/Mul results, and exact unsigned logical Shr results, while function metadata carries typed integer literal const facts, advisory exact numeric return facts, and exact Add/Sub/Mul, Compare, and logical Shr route facts. Typed-object layout plans now preserve exact numeric storage names such as usize distinctly from legacy i64 storage. The VM role is fixed as semantic reference executor, not product/mainline backend owner, and now consumes MIR-owned exact arithmetic, compare, and logical Shr route facts; arithmetic and logical Shr results use tagged exact numeric runtime values instead of collapsing back into Integer(i64). The MIR verifier rejects statically known out-of-range writes to exact numeric declared fields and unchecked dynamic writes when the exact numeric range does not cover the full dynamic Integer(i64) lane. MIR semantic refresh attaches matching DynamicIntegerRange function metadata for real exact numeric FieldSet producers after optimization and before verification, the VM interpreter executes existing contracts before mutation, and unsupported non-VM backend routes now use one MIR-owned capability gate that fails fast when runtime-check contracts, exact numeric typed-object storage, or exact numeric op route facts remain unlowered. RawBuf and OSVM expose first byte-length usize facades, Buf/RawArray/bounds/initialized-range now expose provisional usize aliases over the non-negative current-lane i64 subset, and MIR raw-layout plans now accept usize/isize fields by resolving them through NumericTarget pointer-width layout rules without adding source syntax or backend-native layout execution. nyash_kernel typed-object storage now records exact numeric slot kinds, including usize, separately from legacy i64; exact signed/unsigned field helpers range-check by slot storage kind, while legacy i64 field helpers do not mutate exact numeric slots through the legacy ABI. Python LLVM carries MIR JSON typed_object_plans, and both Python LLVM and the pure-first C shim now register exact typed-object layouts before user code, create exact typed-object handles for exact-storage plans, and lower exact field get/set to slot-based nyash.object.* helpers with fail-fast status checks on set. Python LLVM now also consumes MIR-owned exact add/sub/mul, compare, and logical right-shift route facts with checked overflow/range traps, signed/unsigned compare predicates, and lshr shift-count traps. Current runtime truth: legacy dynamic integer values still use Integer(i64), VM reference exact numeric route results can carry tagged exact values, and production hako_alloc facade stats are exact usize while page, heap, queue, and handle fields remain i64 until their own field-group rows change them. The phase still owns .hako suffix parity, param/local verifier checks, runtime-check insertion/lowering beyond exact numeric field-write and typed literal contracts, exact numeric div/mod/bitwise/wrapping vocabulary, WASM exact typed-object field/op consumption, and hako_alloc field migration. Phase 293x remains the parent real-app/mimalloc lane; allocator-provider activation, host allocator replacement, hooks, and #[global_allocator] remain inactive."
