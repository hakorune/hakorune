name: portability-ci

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-build:
    name: macOS build (release)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Build hakorune (release)
        run: cargo build --release --bin hakorune -q

  windows-check:
    name: Windows check
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Check hakorune
        run: cargo check --bin hakorune -q

  plugin-recovery-check:
    name: Plugin recovery check (${{ matrix.os }} / ${{ matrix.plugin.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        plugin:
          - name: array
            manifest: plugins/nyash-array-plugin/Cargo.toml
          - name: map
            manifest: plugins/nyash-map-plugin/Cargo.toml
          - name: string
            manifest: plugins/nyash-string-plugin/Cargo.toml
          - name: console
            manifest: plugins/nyash-console-plugin/Cargo.toml
          - name: filebox
            manifest: plugins/nyash-filebox-plugin/Cargo.toml
          - name: path
            manifest: plugins/nyash-path-plugin/Cargo.toml
          - name: math
            manifest: plugins/nyash-math-plugin/Cargo.toml
          - name: net
            manifest: plugins/nyash-net-plugin/Cargo.toml
    steps:
      - name: Enable Git long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Check plugin crate
        run: cargo check --manifest-path ${{ matrix.plugin.manifest }} -q
