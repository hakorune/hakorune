# SSOT note:
# - `hako.toml` is the preferred config file (module registry / using resolution / tasks).
# - `nyash.toml` remains as a compatibility name (but should not be edited going forward).

[env]
# Put environment defaults used by tools or examples if needed
# Enable using resolver by default (can be disabled with NYASH_SKIP_TOML_ENV=1)
NYASH_ENABLE_USING = "1"
# Enable dev sugar preexpand for @ local alias (line-head) during parsing
NYASH_DEV_AT_LOCAL = "1"
# AOT prep/fast-path defaults (dev/quick friendly; override with NYASH_SKIP_TOML_ENV=1)
# Collections hot path rewrite (Array/Map boxcall→externcall)
NYASH_AOT_COLLECTIONS_HOT = "1"
# Integer fast paths and simple loop hoist (safe CFG-invariant opts)
NYASH_LLVM_FAST = "1"
NYASH_MIR_LOOP_HOIST = "1"
# Map key mode heuristic (h/hh chosen automatically by linearity)
NYASH_AOT_MAP_KEY_MODE = "auto"

[using]
paths = ["apps", "lib", ".", "lang/src"]

# Workspace module mapping (lang/ tree)
[modules.workspace]
members = [
  "lang/src/compiler/hako_module.toml",
  "lang/src/mir/hako_module.toml",
  "lang/src/shared/hako_module.toml",
  "lang/src/vm/hako_module.toml",
  "lang/src/runtime/meta/hako_module.toml",
  "lang/src/runtime/kernel/hako_module.toml",
  "lang/src/hako_alloc/hako_module.toml",
  "lang/src/runner/hako_module.toml",
  "lang/src/llvm_ir/hako_module.toml",
  "lang/src/opt/hako_module.toml",
  "lang/src/selfhost/hako_module.toml"
]

# Optional package-style entries (opt-in via using resolver)
[using.json_native]
path = "apps/lib/json_native/"
main = "parser/parser.hako"

# JSON Native – String utilities as a standalone package (single-file)
[using.string_utils]
path = "apps/lib/json_native/utils/string.hako"

[using.aliases]
# Resolve `using json as ...` to json_native when desired
json = "json_native"
StringUtils = "string_utils"
StringHelpers = "sh_core"
JsonNode = "json_node"

[using.json_node]
path = "apps/lib/json_native/core/node.hako"

# JSON stringify (Stage-B compiler dependency)
[using.stringify]
path = "lang/src/shared/json/stringify.hako"

# String helpers (Parser dependency)
[using.sh_core]
path = "lang/src/shared/common/string_helpers.hako"

[plugin_paths]
search_paths = ["target/release"]

[module_roots]
# Prefix → directory mapping for `using` module name resolution.
# Resolution rule: longest prefix match, then construct `<root>/<suffix>.hako`.
# Exact matches in [modules] always win over module_roots.
#
# Example:
#   using lang.compiler.entry.func_scanner
#     → "lang.compiler" matches
#     → "lang/src/compiler" + "/entry/func_scanner.hako"
#     → "lang/src/compiler/entry/func_scanner.hako"
"lang.compiler" = "lang/src/compiler"
"lang.mir" = "lang/src/mir"
"lang.shared" = "lang/src/shared"
"lang.vm" = "lang/src/vm"
"lang.runtime" = "lang/src/runtime"
"lang.hako_alloc" = "lang/src/hako_alloc"
"lang.runner" = "lang/src/runner"
"lang.llvm_ir" = "lang/src/llvm_ir"
"lang.opt" = "lang/src/opt"
"lang.selfhost" = "lang/src/selfhost"
"apps.selfhost_runtime" = "apps/selfhost-runtime"
"apps.lib" = "apps/lib"
"tools.hako_shared" = "tools/hako_shared"

[modules]
# Core shared helpers (needed by parser/compiler in Stage-B)
"sh_core" = "lang/src/shared/common/string_helpers.hako"
"lang.shared.module_roots_priority_box" = "lang/src/shared/module_roots_priority_override_box.hako"

# Selfhost runtime utilities (opt-in; prod profile friendly: no file-path using)
"apps.selfhost_runtime.prelude" = "apps/selfhost-runtime/selfhost_prelude.hako"
"apps.selfhost_runtime.mir_loader" = "apps/selfhost-runtime/mir_loader.hako"
"apps.selfhost_runtime.ops_calls" = "apps/selfhost-runtime/ops_calls.hako"
"apps.selfhost_runtime.string_cursor" = "apps/selfhost-runtime/lib/string_cursor.hako"
"apps.selfhost_runtime.ast_extractors" = "apps/selfhost-runtime/lib/ast_extractors.hako"

# Common boxes (used by selfhost runtime)
"apps.lib.boxes.console_std" = "apps/lib/boxes/console_std.hako"
"apps.lib.boxes.string_std" = "apps/lib/boxes/string_std.hako"
"apps.lib.boxes.array_std" = "apps/lib/boxes/array_std.hako"
"apps.lib.boxes.map_std" = "apps/lib/boxes/map_std.hako"

# Shared tools (prod profile friendly)
"tools.hako_shared.json_parser" = "tools/hako_shared/json_parser.hako"
