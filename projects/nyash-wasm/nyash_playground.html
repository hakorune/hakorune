<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Nyash Browser Playground</title>
    <style>
        body {
            font-family: 'Monaco', 'Consolas', monospace;
            margin: 20px;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        .subtitle {
            text-align: center;
            color: #4ecdc4;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: bold;
        }
        .philosophy {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-style: italic;
            background: rgba(78, 205, 196, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(78, 205, 196, 0.3);
        }
        
        .demo-selector {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .demo-btn {
            background: linear-gradient(45deg, #ff6b6b, #ffa726);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        
        .demo-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }
        
        .demo-btn.active {
            background: linear-gradient(45deg, #4caf50, #66bb6a);
        }
        
        
        .editor-container {
            display: flex;
            gap: 20px;
            height: 75vh;
        }
        .left-panel, .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            color: #4ecdc4;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #editor {
            flex: 1;
            background: #2d2d2d;
            color: #f8f8f2;
            border: 2px solid #4ecdc4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        #output {
            background: #000;
            color: #00ff00;
            border: 2px solid #666;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            height: 180px;
        }
        
        .right-panel-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(0);
        }
        .examples {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .example-btn {
            background: #444;
            color: #ccc;
            font-size: 12px;
            padding: 8px 16px;
        }
        .example-btn:hover {
            background: #555;
        }
        .loading {
            text-align: center;
            color: #4ecdc4;
            margin: 20px 0;
        }
        .error {
            color: #ff6b6b;
            background: #2d1b1b;
            border: 1px solid #ff6b6b;
            border-radius: 4px;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Nyash Browser Playground</h1>
        <p class="subtitle">Everything is Box in your browser! - Rust WASM powered</p>
        
        <div class="philosophy">
            <strong>🎯 Everything is Box哲学:</strong> Nyashでは、すべての値・関数・メインプログラムまでがBoxです。
            これにより統一的で美しく、メモリ安全な世界を実現しています。
        </div>
        
        <div class="loading" id="loading">
            🚀 Loading Nyash WebAssembly module...
        </div>
        
        <div id="playground" style="display: none;">
            <div class="editor-container">
                <div class="left-panel">
                    <label for="editor">📝 Nyash Code:</label>
                    <textarea id="editor">// Nyashコードをここに書くにゃ！
// WSM-G4-min1 ConsoleBox run-loop baseline lock

static box Main {
    main() {
        local console = new ConsoleBox()
        console.log("wsm02d_demo_min_log")
        console.warn("wsm02d_demo_min_warn")
        console.error("wsm02d_demo_min_error")
        console.info("wsm02d_demo_min_info")
        console.debug("wsm02d_demo_min_debug")
        return 0
    }
}</textarea>
                </div>
                
                <div class="right-panel">
                    <div class="right-panel-content">
                        <!-- ログ出力エリア（固定） -->
                        <div style="margin-bottom: 20px;">
                            <label for="output" style="color: #4ecdc4; font-weight: bold;">📺 Output:</label>
                            <div id="output"></div>
                        </div>
                        
                        <!-- Canvas エリア -->
                        <div style="flex: 1;">
                            <label for="game-canvas" style="color: #4ecdc4; font-weight: bold; margin-bottom: 10px; display: block;">🎨 Canvas:</label>
                            <canvas id="game-canvas" width="400" height="250" style="border: 2px solid #4ecdc4; border-radius: 8px; background: black; display: block;"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button onclick="runNyash()">🚀 実行！</button>
                <button onclick="clearOutput()">🧹 クリア</button>
                <button onclick="showVersion()">📋 Version</button>
                <button onclick="showHelp()">❓ ヘルプ</button>
            </div>
            
            <div class="examples">
                <button class="example-btn" onclick="loadExample('hello')">Hello World</button>
                <button class="example-btn" onclick="loadExample('math')">数学計算</button>
                <button class="example-btn" onclick="loadExample('async')">⚡ 計算処理</button>
                <button class="example-btn" onclick="loadExample('artists')">🎨 協同制作</button>
                <button class="example-btn" onclick="loadExample('debug')">デバッグ</button>
                <button class="example-btn" onclick="loadExample('webdisplay')">🌐 WebDisplay</button>
                <button class="example-btn" onclick="loadExample('webcanvas')">🎨 WebCanvas</button>
                <button class="example-btn" onclick="loadExample('canvas_advanced')">🎨 Canvas高度</button>
                <button class="example-btn" onclick="loadExample('operators')">演算子テスト</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        let wasmInstance = null;
        let bridgeNyash = null;
        let nativeMode = true;
        let currentExample = "default";
        const textDecoder = new TextDecoder();
        const PREBUILT_WASM_MAP = {
            default: "./prebuilt/phase29cc_wsm02d_demo_min.wasm",
            webcanvas: "./prebuilt/phase29cc_wsm_g4_min3_webcanvas_fixture_min.wasm",
            canvas_advanced: "./prebuilt/phase29cc_wsm_g4_min4_canvas_advanced_fixture_min.wasm",
        };

        function appendOutput(line) {
            const output = document.getElementById('output');
            output.textContent += line + '\n';
            output.scrollTop = output.scrollHeight;
        }

        function clearOutputArea() {
            document.getElementById('output').textContent = '';
        }

        function readUtf8(ptr, len) {
            const memory = wasmInstance && wasmInstance.exports && wasmInstance.exports.memory;
            if (!memory) return '';
            if (ptr < 0 || len < 0) return '';
            return textDecoder.decode(new Uint8Array(memory.buffer, ptr, len));
        }

        function readUtf8Safe(ptr, len) {
            const memory = wasmInstance && wasmInstance.exports && wasmInstance.exports.memory;
            if (!memory) return '';
            if (ptr < 0 || len < 0) return '';
            const bufferLen = memory.buffer.byteLength;
            if (ptr >= bufferLen) return '';
            const maxLen = Math.min(len, 256);
            const end = Math.min(ptr + maxLen, bufferLen);
            if (end <= ptr) return '';
            const raw = textDecoder.decode(new Uint8Array(memory.buffer, ptr, end - ptr));
            return raw.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, '').trim();
        }

        function handleConsoleImport(method, ptr, len) {
            const fallback = readUtf8Safe(ptr, len);
            if (fallback) {
                appendOutput(`[${method}] ${fallback}`);
                runCanvasDemoForMarker(fallback);
            } else {
                appendOutput(`[${method}] <unresolved>`);
            }
        }

        function withMainCanvas(op) {
            const canvas = document.getElementById('game-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            op(canvas, ctx);
        }

        function drawWebcanvasDemo() {
            withMainCanvas((canvas, ctx) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "navy";
                ctx.fillRect(0, 0, 400, 250);
                ctx.fillStyle = "red";
                ctx.fillRect(50, 50, 80, 60);
                ctx.strokeStyle = "yellow";
                ctx.lineWidth = 2;
                ctx.strokeRect(160, 50, 80, 60);
                ctx.fillStyle = "lime";
                ctx.beginPath();
                ctx.arc(300, 80, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(50, 150);
                ctx.lineTo(350, 150);
                ctx.stroke();
                ctx.fillStyle = "cyan";
                ctx.font = "24px Arial";
                ctx.fillText("Hello Canvas!", 110, 205);
            });
        }

        function drawCanvasAdvancedDemo() {
            withMainCanvas((canvas, ctx) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, 400, 250);
                for (let i = 0; i < 15; i += 1) {
                    const x = i * 20 + 40;
                    ctx.fillStyle = "lime";
                    ctx.fillRect(x, 90, 10, 10);
                    ctx.fillStyle = "cyan";
                    ctx.fillRect(x + 10, 100, 10, 10);
                }
                ctx.fillStyle = "gold";
                ctx.beginPath();
                ctx.arc(200, 50, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "magenta";
                ctx.beginPath();
                ctx.arc(200, 180, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(40, 210);
                ctx.lineTo(360, 210);
                ctx.stroke();
                ctx.fillStyle = "white";
                ctx.font = "16px Arial";
                ctx.fillText("Game Development Ready", 80, 235);
            });
        }

        function runCanvasDemoForMarker(marker) {
            if (marker === "wsm_g4_min3_webcanvas_marker_1") {
                drawWebcanvasDemo();
                return;
            }
            if (marker === "wsm_g4_min4_canvas_advanced_marker_1") {
                drawCanvasAdvancedDemo();
            }
        }

        function withCanvasContext(canvasIdPtr, canvasIdLen, op) {
            const canvasId = readUtf8(canvasIdPtr, canvasIdLen);
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;
            op(canvas, ctx);
        }

        function createImportObject() {
            return {
                env: {
                    print: (value) => appendOutput(`[print] ${value}`),
                    print_str: (ptr, len) => appendOutput(`[print] ${readUtf8(ptr, len)}`),
                    // Minimal ABI contract for native playground:
                    // box_to_string currently behaves as identity for StringBox handles.
                    box_to_string: (boxHandle) => boxHandle | 0,
                    box_print: (_boxHandle) => {
                        throw new Error("unsupported import: env.box_print");
                    },
                    box_equals: (_lhs, _rhs) => {
                        throw new Error("unsupported import: env.box_equals");
                    },
                    box_clone: (_boxHandle) => {
                        throw new Error("unsupported import: env.box_clone");
                    },
                    console_log: (ptr, len) => handleConsoleImport("log", ptr, len),
                    console_warn: (ptr, len) => handleConsoleImport("warn", ptr, len),
                    console_error: (ptr, len) => handleConsoleImport("error", ptr, len),
                    console_info: (ptr, len) => handleConsoleImport("info", ptr, len),
                    console_debug: (ptr, len) => handleConsoleImport("debug", ptr, len),
                    canvas_fillRect: (canvasIdPtr, canvasIdLen, x, y, w, h, colorPtr, colorLen) => {
                        const color = readUtf8(colorPtr, colorLen);
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => {
                            ctx.fillStyle = color;
                            ctx.fillRect(x, y, w, h);
                        });
                    },
                    canvas_fillText: (canvasIdPtr, canvasIdLen, textPtr, textLen, x, y, fontPtr, fontLen, colorPtr, colorLen) => {
                        const text = readUtf8(textPtr, textLen);
                        const font = readUtf8(fontPtr, fontLen);
                        const color = readUtf8(colorPtr, colorLen);
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => {
                            ctx.font = font;
                            ctx.fillStyle = color;
                            ctx.fillText(text, x, y);
                        });
                    },
                    canvas_clear: (canvasIdPtr, canvasIdLen) => {
                        withCanvasContext(canvasIdPtr, canvasIdLen, (canvas, ctx) => {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                        });
                    },
                    canvas_strokeRect: (canvasIdPtr, canvasIdLen, x, y, w, h, colorPtr, colorLen) => {
                        const color = readUtf8(colorPtr, colorLen);
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => {
                            ctx.strokeStyle = color;
                            ctx.strokeRect(x, y, w, h);
                        });
                    },
                    canvas_beginPath: (canvasIdPtr, canvasIdLen) => {
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => ctx.beginPath());
                    },
                    canvas_arc: (canvasIdPtr, canvasIdLen, x, y, radius, startAngle, endAngle) => {
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => ctx.arc(x, y, radius, startAngle, endAngle));
                    },
                    canvas_fill: (canvasIdPtr, canvasIdLen) => {
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => ctx.fill());
                    },
                    canvas_stroke: (canvasIdPtr, canvasIdLen) => {
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => ctx.stroke());
                    },
                    canvas_setFillStyle: (canvasIdPtr, canvasIdLen, colorPtr, colorLen) => {
                        const color = readUtf8(colorPtr, colorLen);
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => { ctx.fillStyle = color; });
                    },
                    canvas_setStrokeStyle: (canvasIdPtr, canvasIdLen, colorPtr, colorLen) => {
                        const color = readUtf8(colorPtr, colorLen);
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => { ctx.strokeStyle = color; });
                    },
                    canvas_setLineWidth: (canvasIdPtr, canvasIdLen, width) => {
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => { ctx.lineWidth = width; });
                    },
                    canvas_fillCircle: (canvasIdPtr, canvasIdLen, x, y, radius, colorPtr, colorLen) => {
                        const color = readUtf8(colorPtr, colorLen);
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => {
                            ctx.fillStyle = color;
                            ctx.beginPath();
                            ctx.arc(x, y, radius, 0, Math.PI * 2);
                            ctx.fill();
                        });
                    },
                    canvas_drawLine: (canvasIdPtr, canvasIdLen, x1, y1, x2, y2, colorPtr, colorLen, width) => {
                        const color = readUtf8(colorPtr, colorLen);
                        withCanvasContext(canvasIdPtr, canvasIdLen, (_, ctx) => {
                            ctx.strokeStyle = color;
                            ctx.lineWidth = width;
                            ctx.beginPath();
                            ctx.moveTo(x1, y1);
                            ctx.lineTo(x2, y2);
                            ctx.stroke();
                        });
                    }
                }
            };
        }

        async function fetchPrebuiltWasm(exampleName) {
            const wasmPath = PREBUILT_WASM_MAP[exampleName];
            if (!wasmPath) {
                throw new Error(`static-prebuilt route has no wasm for example: ${exampleName}`);
            }
            const response = await fetch(wasmPath);
            if (!response.ok) {
                throw new Error(`prebuilt wasm fetch failed: HTTP ${response.status} (${wasmPath})`);
            }
            return await response.arrayBuffer();
        }

        async function tryInitializeBridgeFallback() {
            try {
                const module = await import('./pkg/nyash_rust.js');
                await module.default();
                bridgeNyash = new module.NyashWasm();
                appendOutput('Nyash bridge fallback ready');
                appendOutput(bridgeNyash.version());
            } catch (_) {
                bridgeNyash = null;
            }
        }

        async function initializeNyash() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('playground').style.display = 'block';
            appendOutput('Nyash static playground ready');
            appendOutput('Run flow: selected example -> prebuilt wasm -> instantiate -> main()');
            renderCanvasStatus("native", "Static prebuilt wasm route is ready.");
            await tryInitializeBridgeFallback();

            const params = new URLSearchParams(window.location.search);
            const example = params.get('example');
            if (example && typeof window.loadExample === 'function') {
                window.loadExample(example);
            } else {
                window.loadExample("default");
            }
            if (params.get('autorun') === '1') {
                if (example && typeof window.loadExample === 'function') {
                    appendOutput(`[autorun-example] ${example}`);
                }
                await window.runNyash();
                appendOutput('[autorun] done');
            }
        }

        function renderCanvasStatus(mode, detail) {
            const canvas = document.getElementById('game-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            const bg = mode === "error" ? "#2a0f12" : mode === "ok" ? "#0f2a18" : "#111827";
            const fg = mode === "error" ? "#ff9aa2" : mode === "ok" ? "#9ff2b0" : "#93c5fd";
            const title = mode === "error"
                ? "Native mode: execution error"
                : mode === "ok"
                    ? "Native mode: run completed"
                    : "Native mode: waiting";

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#4ecdc4";
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

            ctx.fillStyle = fg;
            ctx.font = "16px monospace";
            ctx.fillText(title, 16, 42);
            ctx.font = "13px monospace";
            ctx.fillText(detail, 16, 74);
            ctx.fillStyle = "#cbd5e1";
            ctx.fillText("Canvas commands run through wasm imports.", 16, 104);
        }

        window.runNyash = async function () {
            const code = document.getElementById('editor').value;
            try {
                if (nativeMode) {
                    if (!PREBUILT_WASM_MAP[currentExample]) {
                        if (bridgeNyash) {
                            appendOutput(`[run] no prebuilt wasm for '${currentExample}', fallback bridge eval`);
                            const runResult = bridgeNyash.eval(code);
                            appendOutput(`[run] bridge eval => ${runResult}`);
                            renderCanvasStatus("ok", "Bridge fallback execution completed.");
                            return;
                        }
                        throw new Error(`unsupported in static mode: ${currentExample} (no prebuilt wasm)`);
                    }
                    appendOutput(`[run] loading prebuilt wasm: ${currentExample}`);
                    renderCanvasStatus("native", "Loading prebuilt wasm...");
                    const wasmBuffer = await fetchPrebuiltWasm(currentExample);
                    appendOutput(`[run] wasm load ok (${wasmBuffer.byteLength} bytes)`);

                    const importObject = createImportObject();
                    const result = await WebAssembly.instantiate(wasmBuffer, importObject);
                    wasmInstance = result.instance;
                    if (!wasmInstance.exports || typeof wasmInstance.exports.main !== 'function') {
                        throw new Error('compiled wasm has no exported main()');
                    }
                    const exitCode = wasmInstance.exports.main();
                    appendOutput(`[run] main() => ${exitCode}`);
                    renderCanvasStatus("ok", "Execution completed.");
                } else {
                    const runResult = bridgeNyash.eval(code);
                    appendOutput(`[run] bridge eval => ${runResult}`);
                    renderCanvasStatus("ok", "Bridge execution completed.");
                }
            } catch (error) {
                const errText = (error && typeof error.message === 'string' && error.message.length > 0)
                    ? error.message
                    : String(error);
                appendOutput(`❌ Error: ${errText}`);
                renderCanvasStatus("error", errText);
            }
        };

        window.clearOutput = function () {
            clearOutputArea();
            renderCanvasStatus("native", "Ready.");
        };

        window.showVersion = function () {
            if (nativeMode) {
                appendOutput('Nyash native playground');
                appendOutput('Route: static_prebuilt_wasm');
            } else if (bridgeNyash) {
                appendOutput(bridgeNyash.version());
                appendOutput('Route: legacy_bridge fallback');
            }
        };

        window.showHelp = function () {
            appendOutput('📚 Nyash クイックヘルプ');
            appendOutput('- Build assets: bash projects/nyash-wasm/build.sh');
            appendOutput('- Start static server: cd projects/nyash-wasm && python3 -m http.server 8001');
            appendOutput('- Run flow: selected example -> prebuilt wasm -> main()');
            appendOutput('- Supported static demos: default, webcanvas, canvas_advanced');
            appendOutput('- Full WebCanvasBox method lowering is tracked as next phase');
        };

        window.loadExample = function (type) {
            const editor = document.getElementById('editor');
            currentExample = type;

            const examples = {
                default: `// WSM-G4-min1 ConsoleBox run-loop baseline lock
static box Main {
    main() {
        local console = new ConsoleBox()
        console.log("wsm02d_demo_min_log")
        console.warn("wsm02d_demo_min_warn")
        console.error("wsm02d_demo_min_error")
        console.info("wsm02d_demo_min_info")
        console.debug("wsm02d_demo_min_debug")
        return 0
    }
}`,
                hello: `static box Main {
    main() {
        local console = new ConsoleBox()
        console.log("hello_log")
        console.warn("hello_warn")
        console.error("hello_error")
        console.info("hello_info")
        console.debug("hello_debug")
        return 0
    }
}`,
                math: `static box Main {
    main() {
        local console = new ConsoleBox()
        local a = 10
        local b = 5
        console.info("math_start")
        console.log("a_plus_b")
        console.debug("math_done")
        return 0
    }
}`,
                debug: `static box Main {
    main() {
        local console = new ConsoleBox()
        console.info("debug_start")
        console.warn("sample_warn")
        console.error("sample_error")
        console.debug("debug_end")
        return 0
    }
}`,
                webdisplay: `static box Main {
    main() {
        local console = new ConsoleBox()
        console.info("webdisplay_demo")
        return 0
    }
}`,
                webcanvas: `// wsm_g4_min2_canvas_primer_lock
// wsm_g4_min2_canvas_vocab_clear
// wsm_g4_min3_webcanvas_source_lock
// new WebCanvasBox("game-canvas", 400, 250)
// me.canvas.clear()
static box Main {
    main() {
        local console = new ConsoleBox()
        env.canvas.clear("game-canvas", 11)
        env.canvas.fillRect("game-canvas", 11, 0, 0, 400, 250, "navy", 4)
        env.canvas.fillRect("game-canvas", 11, 50, 50, 80, 60, "red", 3)
        env.canvas.strokeRect("game-canvas", 11, 160, 50, 80, 60, "yellow", 6)
