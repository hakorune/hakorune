<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Nyash Browser Playground</title>
    <style>
        body {
            font-family: 'Monaco', 'Consolas', monospace;
            margin: 20px;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
            color: #ffffff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }
        .subtitle {
            text-align: center;
            color: #4ecdc4;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: bold;
        }
        .philosophy {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-style: italic;
            background: rgba(78, 205, 196, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(78, 205, 196, 0.3);
        }
        
        .demo-selector {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .demo-btn {
            background: linear-gradient(45deg, #ff6b6b, #ffa726);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        
        .demo-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }
        
        .demo-btn.active {
            background: linear-gradient(45deg, #4caf50, #66bb6a);
        }
        
        
        .editor-container {
            display: flex;
            gap: 20px;
            height: 75vh;
        }
        .left-panel, .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            color: #4ecdc4;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #editor {
            flex: 1;
            background: #2d2d2d;
            color: #f8f8f2;
            border: 2px solid #4ecdc4;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        #output {
            background: #000;
            color: #00ff00;
            border: 2px solid #666;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            height: 180px;
        }
        
        .right-panel-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        button:active {
            transform: translateY(0);
        }
        .examples {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .example-btn {
            background: #444;
            color: #ccc;
            font-size: 12px;
            padding: 8px 16px;
        }
        .example-btn:hover {
            background: #555;
        }
        .loading {
            text-align: center;
            color: #4ecdc4;
            margin: 20px 0;
        }
        .error {
            color: #ff6b6b;
            background: #2d1b1b;
            border: 1px solid #ff6b6b;
            border-radius: 4px;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Nyash Browser Playground</h1>
        <p class="subtitle">Everything is Box in your browser! - Rust WASM powered</p>
        
        <div class="philosophy">
            <strong>🎯 Everything is Box哲学:</strong> Nyashでは、すべての値・関数・メインプログラムまでがBoxです。
            これにより統一的で美しく、メモリ安全な世界を実現しています。
        </div>
        
        <div class="loading" id="loading">
            🚀 Loading Nyash WebAssembly module...
        </div>
        
        <div id="playground" style="display: none;">
            <div class="editor-container">
                <div class="left-panel">
                    <label for="editor">📝 Nyash Code:</label>
                    <textarea id="editor" placeholder="// Nyashコードをここに書くにゃ！
// WSM-G4-min1 ConsoleBox run-loop baseline lock

static box Main {
    main() {
        local console = new ConsoleBox()
        console.log(\"wsm02d_demo_min_log\")
        console.warn(\"wsm02d_demo_min_warn\")
        console.error(\"wsm02d_demo_min_error\")
        console.info(\"wsm02d_demo_min_info\")
        console.debug(\"wsm02d_demo_min_debug\")
        return 0
    }
}"></textarea>
                </div>
                
                <div class="right-panel">
                    <div class="right-panel-content">
                        <!-- ログ出力エリア（固定） -->
                        <div style="margin-bottom: 20px;">
                            <label for="output" style="color: #4ecdc4; font-weight: bold;">📺 Output:</label>
                            <div id="output"></div>
                        </div>
                        
                        <!-- Canvas エリア -->
                        <div style="flex: 1;">
                            <label for="game-canvas" style="color: #4ecdc4; font-weight: bold; margin-bottom: 10px; display: block;">🎨 Canvas:</label>
                            <canvas id="game-canvas" width="400" height="250" style="border: 2px solid #4ecdc4; border-radius: 8px; background: black; display: block;"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button onclick="runNyash()">🚀 実行！</button>
                <button onclick="clearOutput()">🧹 クリア</button>
                <button onclick="showVersion()">📋 Version</button>
                <button onclick="showHelp()">❓ ヘルプ</button>
            </div>
            
            <div class="examples">
                <button class="example-btn" onclick="loadExample('hello')">Hello World</button>
                <button class="example-btn" onclick="loadExample('math')">数学計算</button>
                <button class="example-btn" onclick="loadExample('async')">⚡ 計算処理</button>
                <button class="example-btn" onclick="loadExample('artists')">🎨 協同制作</button>
                <button class="example-btn" onclick="loadExample('debug')">デバッグ</button>
                <button class="example-btn" onclick="loadExample('webdisplay')">🌐 WebDisplay</button>
                <button class="example-btn" onclick="loadExample('webcanvas')">🎨 WebCanvas</button>
                <button class="example-btn" onclick="loadExample('canvas_advanced')">🎨 Canvas高度</button>
                <button class="example-btn" onclick="loadExample('operators')">演算子テスト</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import init, { NyashWasm } from './pkg/nyash_rust.js';
        
        let nyash;
        
        async function initializeNyash() {
            try {
                // Initialize WASM module
                await init();
                
                // Create Nyash interpreter instance
                nyash = new NyashWasm();
                
                // Show playground and hide loading
                document.getElementById('loading').style.display = 'none';
                document.getElementById('playground').style.display = 'block';
                
                // Show version info in output
                const output = document.getElementById('output');
                output.textContent = '🎉 Nyash WASM initialized successfully!\n' + 
                                   nyash.version() + '\n\n' +
                                   'Ready to execute Nyash code...\n';
                renderCanvasStatus("bridge", "Canvas commands are not executed in this bridge.");

                const params = new URLSearchParams(window.location.search);
                if (params.get('autorun') === '1') {
                    setTimeout(() => {
                        const example = params.get('example');
                        if (example && typeof window.loadExample === 'function') {
                            window.loadExample(example);
                            output.textContent += `[autorun-example] ${example}\\n`;
                        }
                        window.runNyash();
                        output.textContent += '[autorun] done\\n';
                    }, 0);
                }
                
            } catch (error) {
                document.getElementById('loading').innerHTML = 
                    '<div class="error">❌ Failed to load Nyash WASM: ' + error.message + '</div>';
            }
        }

        function renderCanvasStatus(mode, detail) {
            const canvas = document.getElementById('game-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            const bg = mode === "error" ? "#2a0f12" : mode === "ok" ? "#0f2a18" : "#111827";
            const fg = mode === "error" ? "#ff9aa2" : mode === "ok" ? "#9ff2b0" : "#93c5fd";
            const title = mode === "error"
                ? "Bridge mode: execution error"
                : mode === "ok"
                    ? "Bridge mode: console calls executed"
                    : "Bridge mode: console-only runner";

            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#4ecdc4";
            ctx.lineWidth = 2;
            ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

            ctx.fillStyle = fg;
            ctx.font = "16px monospace";
            ctx.fillText(title, 16, 42);
            ctx.font = "13px monospace";
            ctx.fillText(detail, 16, 74);
            ctx.fillStyle = "#cbd5e1";
            ctx.fillText("Use console.log/warn/error/info/debug literal calls.", 16, 104);
        }
        
        // Global functions for buttons
        window.runNyash = function() {
            if (!nyash) {
                alert('Nyash is not loaded yet!');
                return;
            }
            
            const code = document.getElementById('editor').value;
            const output = document.getElementById('output');
            
            try {
                renderCanvasStatus("bridge", "Running in bridge mode...");
                const result = nyash.eval(code);
                output.textContent += '> ' + result + '\n';
                output.scrollTop = output.scrollHeight;
                renderCanvasStatus("ok", "Run completed. Output is shown in console panel.");
            } catch (error) {
                const errText = (error && typeof error.message === 'string' && error.message.length > 0)
                    ? error.message
                    : String(error);
                output.textContent += '❌ Error: ' + errText + '\n';
                output.scrollTop = output.scrollHeight;
                renderCanvasStatus("error", errText);
            }
        };
        
        window.clearOutput = function() {
            document.getElementById('output').textContent = '';
            renderCanvasStatus("bridge", "Canvas commands are not executed in this bridge.");
        };
        
        window.showVersion = function() {
            if (nyash) {
                const output = document.getElementById('output');
                output.textContent += '📋 ' + nyash.version() + '\\n';
                output.textContent += '🎯 Static Box Mainパターン: ✅ 実装済み\\n';
                output.textContent += '🔒 変数宣言厳密性: ✅ 有効\\n';
                output.textContent += '⚡ 演算子(AND/OR/NOT/除算): ✅ 対応済み\\n';
                output.textContent += '🌐 WebCanvasBox + WebConsoleBox: ✅ 利用可能\\n\\n';
                output.scrollTop = output.scrollHeight;
            }
        };
        
        window.showHelp = function() {
            const output = document.getElementById('output');
            output.textContent += `📚 Nyash クイックヘルプ:

🎯 このページの実行モデル (WSM-G2 bridge):
- console.log("...")
- console.warn("...")
- console.error("...")
- console.info("...")
- console.debug("...")

上の5メソッドを literal 文字列で呼ぶ形だけを実行するよ。
me.console や WebCanvasBox は bridge 実行対象外。

🎯 推奨コード形:
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.log("hello")
        return 0
    }
}
`;
            output.scrollTop = output.scrollHeight;
        };
        
        window.loadExample = function(type) {
            const editor = document.getElementById('editor');
            
            const examples = {
                hello: `// Console baseline (bridge-safe)
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.log("hello_log")
        console.warn("hello_warn")
        console.error("hello_error")
        console.info("hello_info")
        console.debug("hello_debug")
        return 0
    }
}`,

                math: `// Math sample (messages are fixed literals in bridge mode)
static box Main {
    main() {
        local console
        local a
        local b
        a = 10
        b = 5
        console = new ConsoleBox()
        console.info("math_case_start")
        console.log("a_plus_b_is_15")
        console.log("a_minus_b_is_5")
        console.log("a_mul_b_is_50")
        console.log("a_div_b_is_2")
        console.debug("math_case_end")
        return 0
    }
}`,

                debug: `// Debug sample (bridge-safe)
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.info("debug_session_start")
        console.log("tracking_enabled")
        console.warn("sample_warning")
        console.error("sample_error")
        console.debug("debug_session_end")
        return 0
    }
}`,

                webdisplay: `// WebDisplay placeholder in bridge mode
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.log("webdisplay_not_supported_in_bridge")
        console.info("use_console_methods_only_here")
        return 0
    }
}`,

                webcanvas: `// WebCanvas placeholder in bridge mode
// wsm_g4_min2_canvas_primer_lock
// wsm_g4_min2_canvas_vocab_clear
// wsm_g4_min3_webcanvas_source_lock
// new WebCanvasBox("game-canvas", 400, 250)
// me.canvas.clear()
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.log("wsm_g4_min3_webcanvas_marker_1")
        console.log("webcanvas_not_supported_in_bridge")
        console.info("canvas_area_shows_bridge_status")
        console.debug("switch_to_native_wasm_path_for_canvas")
        console.log("wsm_g4_min3_webcanvas_marker_2")
        return 0
    }
}`,

                canvas_advanced: `// Advanced canvas placeholder in bridge mode
// wsm_g4_min4_canvas_advanced_source_lock
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.log("wsm_g4_min4_canvas_advanced_marker_1")
        console.warn("canvas_advanced_not_supported_in_bridge")
        console.info("open_native_wasm_playground_for_graphics")
        console.log("wsm_g4_min4_canvas_advanced_marker_2")
        return 0
    }
}`,

                operators: `// Operators sample (bridge-safe literals)
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.info("operators_case_start")
        console.log("not_and_or_supported_in_language")
        console.debug("bridge_captures_literal_console_calls")
        return 0
    }
}`,

                async: `// Computation placeholder in bridge mode
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.log("async_demo_placeholder")
        console.info("bridge_runs_simple_console_calls_only")
        return 0
}`,

                artists: `// Artists placeholder in bridge mode
static box Main {
    main() {
        local console
        console = new ConsoleBox()
        console.log("artists_demo_placeholder")
        console.warn("object_graphics_sample_is_not_bridge_supported")
        console.info("use_native_pipeline_for_full_features")
        return 0
    }
}`
            };
            
            if (examples[type]) {
                editor.value = examples[type];
            }
        };
        
        // Initialize when page loads
        initializeNyash();
    </script>
</body>
</html>
